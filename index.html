<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영천고 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --ink: #0e1420;
  --ink2: #4a5578;
  --ink3: #9aa3bc;
  --line: #e8eaf2;
  --accent: #3b5bfa;
  --accent-soft: #eef0ff;
  --red: #f03e3e;
  --green: #12b76a;
}
[data-theme="dark"] {
  --bg: #0b0d14;
  --surface: #131622;
  --ink: #e8eaf5;
  --ink2: #7a83a8;
  --ink3: #3a4060;
  --line: #1e2235;
  --accent: #5b78ff;
  --accent-soft: #161b3a;
  --red: #f87171;
  --green: #34d399;
}

html, body { background: var(--bg); color: var(--ink); font-family: 'Pretendard', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background .3s, color .3s; }
.wrap { max-width: 600px; margin: 0 auto; padding: 0 20px 80px; }

/* HEADER */
.hd { display: flex; align-items: flex-end; justify-content: space-between; padding: 32px 0 24px; border-bottom: 1.5px solid var(--line); margin-bottom: 28px; }
.logo-sub { font-size: 10px; font-weight: 700; letter-spacing: .14em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.logo-main { font-family: 'Gmarket Sans', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -.03em; line-height: 1; }
.logo-main em { color: var(--accent); font-style: normal; }
.theme-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; transition: transform .2s; }
.theme-btn:hover { transform: rotate(15deg); }

/* CONTROLS */
.ctrl-row { display: flex; gap: 20px; margin-bottom: 28px; align-items: center; flex-wrap: wrap; }
.ctrl-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; color: var(--ink3); text-transform: uppercase; }
.seg { display: flex; }
.seg-btn { padding: 7px 13px; background: none; border: 1.5px solid var(--line); font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink3); cursor: pointer; transition: all .15s; margin-left: -1.5px; }
.seg-btn:first-child { border-radius: 4px 0 0 4px; margin-left: 0; }
.seg-btn:last-child { border-radius: 0 4px 4px 0; }
.seg-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; z-index: 1; position: relative; }
.seg-btn:hover:not(.on) { color: var(--accent); border-color: var(--accent); z-index: 1; position: relative; }

/* TABS */
.tabs { display: flex; border-bottom: 1.5px solid var(--line); margin-bottom: 24px; }
.tab { padding: 10px 0; margin-right: 28px; font-size: 14px; font-weight: 700; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1.5px; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.on) { color: var(--ink2); }

/* NAV */
.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.nav-title { font-family: 'Gmarket Sans', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -.03em; }
.nav-title small { font-size: 13px; font-weight: 500; color: var(--ink3); margin-left: 6px; font-family: 'Pretendard', sans-serif; }
.nav-side { display: flex; gap: 6px; align-items: center; }
.nav-btn { background: none; border: 1.5px solid var(--line); width: 32px; height: 32px; font-size: 16px; font-weight: 900; cursor: pointer; color: var(--ink2); display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: all .15s; }
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.today-btn { padding: 6px 12px; background: none; border: 1.5px solid var(--line); font-family: inherit; font-size: 11px; font-weight: 700; color: var(--ink2); cursor: pointer; border-radius: 4px; transition: all .15s; }
.today-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── WEEK VIEW ── */
.tt-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 12px 4px; text-align: center; border-bottom: 1.5px solid var(--line); font-size: 11px; font-weight: 800; color: var(--ink3); }
thead th.ph { width: 44px; text-align: left; padding-left: 0; font-size: 10px; }
thead th .dn { display: block; font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 1px; }
thead th .dd { display: block; font-size: 10px; color: var(--ink3); font-weight: 500; }
thead th.tc .dn { color: var(--accent); }
thead th.tc { position: relative; }
thead th.tc::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: var(--accent); }
tbody tr { border-bottom: 1px solid var(--line); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 14px 4px; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink); min-width: 68px; }
tbody td.pn { font-size: 10px; font-weight: 700; color: var(--ink3); text-align: left; padding-left: 0; width: 44px; letter-spacing: .04em; }
tbody td.blank { color: var(--line); }
tbody td.tc { color: var(--accent); font-weight: 700; }
tbody tr:hover td:not(.pn) { background: var(--accent-soft); }

/* ── MONTH VIEW (학사일정) ── */
.month-dow { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 8px; }
.month-dow span { text-align: center; font-size: 11px; font-weight: 800; color: var(--ink3); padding: 6px 0; letter-spacing: .06em; }
.month-dow span:first-child { color: var(--red); }
.month-dow span:last-child { color: var(--accent); }

.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1.5px solid var(--line); border-left: 1.5px solid var(--line); }
.month-cell { border-right: 1.5px solid var(--line); border-bottom: 1.5px solid var(--line); min-height: 72px; padding: 6px 7px; position: relative; }
.month-cell.other { opacity: .3; }
.month-cell.weekend { background: var(--bg); }
.month-cell.today { background: var(--accent-soft); }
.cell-num { font-size: 12px; font-weight: 700; color: var(--ink2); display: block; margin-bottom: 3px; }
.month-cell.today .cell-num { color: var(--accent); font-weight: 900; }
.month-cell.sun .cell-num { color: var(--red); }
.month-cell.sat .cell-num { color: var(--accent); }
.cell-event { font-size: 9px; font-weight: 700; color: var(--green); line-height: 1.5; }
.cell-event span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 학사일정 리스트 (월 아래) */
.sched-list { margin-top: 28px; border-top: 1.5px solid var(--line); padding-top: 20px; }
.sched-list-title { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 14px; }
.sched-item { display: flex; align-items: center; gap: 16px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.sched-item:last-child { border-bottom: none; }
.sched-date { font-size: 11px; font-weight: 700; color: var(--accent); width: 76px; flex-shrink: 0; }
.sched-name { font-size: 13px; font-weight: 600; }
.sched-item.today-ev .sched-name { color: var(--accent); }

.state-box { padding: 48px 0; text-align: center; color: var(--ink3); font-size: 13px; line-height: 1.9; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.fade { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div>
      <div class="logo-sub">Yeongcheon High School</div>
      <div class="logo-main">영천고 <em>시간표</em></div>
    </div>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>

  <!-- 학년·반 -->
  <div class="ctrl-row">
    <div class="ctrl-group">
      <span class="ctrl-label">학년</span>
      <div class="seg" id="gradeRow">
        <button class="seg-btn on" data-g="1">1</button>
        <button class="seg-btn" data-g="2">2</button>
        <button class="seg-btn" data-g="3">3</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">반</span>
      <div class="seg" id="classRow">
        <button class="seg-btn on" data-c="1">1</button>
        <button class="seg-btn" data-c="2">2</button>
        <button class="seg-btn" data-c="3">3</button>
        <button class="seg-btn" data-c="4">4</button>
        <button class="seg-btn" data-c="5">5</button>
        <button class="seg-btn" data-c="6">6</button>
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab on" data-tab="week">시간표</button>
    <button class="tab" data-tab="month">학사일정</button>
  </div>

  <!-- 네비 -->
  <div class="nav-bar">
    <div class="nav-title" id="navTitle">--</div>
    <div class="nav-side">
      <button class="today-btn" id="todayBtn">오늘</button>
      <button class="nav-btn" id="prev">‹</button>
      <button class="nav-btn" id="next">›</button>
    </div>
  </div>

  <!-- 시간표 탭 -->
  <div id="weekView">
    <div id="ttArea"><div class="state-box"><span class="spin"></span>불러오는 중…</div></div>
  </div>

  <!-- 학사일정 탭 (월간 달력) -->
  <div id="monthView" style="display:none">
    <div class="month-dow">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="sched-list">
      <div class="sched-list-title" id="schedListTitle">이번 달 일정</div>
      <div id="schedListArea"><div class="state-box"><span class="spin"></span></div></div>
    </div>
  </div>

</div>
<script>
const KEY  = '04b33987e1f94ec598b1835b6756736e';
const BASE = 'https://open.neis.go.kr/hub';
const ATPT = 'R10';
const SC   = '8750119';
const WDAYS = ['월','화','수','목','금'];
const DFULL = ['일','월','화','수','목','금','토'];

let grade = 1, cls = 1, activeTab = 'week';
let selectedMonday = getMondayOf(new Date());
let currentMonth   = new Date();

const ttCache = {}, scCache = {};
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;

function getMondayOf(d) {
  const day = d.getDay(), diff = day===0 ? -6 : 1-day;
  const m = new Date(d); m.setDate(d.getDate()+diff); m.setHours(0,0,0,0); return m;
}
function getWeekDates(mon) {
  return Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function isToday(d) {
  const n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
}
function getAY(d) { return d.getMonth()<2 ? d.getFullYear()-1 : d.getFullYear(); }
function getSem(d) { const m=d.getMonth()+1; return m>=3&&m<=8?1:2; }

async function fetchTT(from, to) {
  const key=`${fmt(from)}_${fmt(to)}_${grade}_${cls}`;
  if(ttCache[key]) return ttCache[key];
  const url=`${BASE}/hisTimetable?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT}&SD_SCHUL_CODE=${SC}&AY=${getAY(from)}&SEM=${getSem(from)}&GRADE=${grade}&CLASS_NM=${cls}&TI_FROM_YMD=${fmt(from)}&TI_TO_YMD=${fmt(to)}`;
  try {
    const j = await (await fetch(url)).json();
    const rows = (!j.RESULT && j.hisTimetable) ? (j.hisTimetable[1]?.row||[]) : [];
    ttCache[key]=rows; return rows;
  } catch(e){ ttCache[key]=[]; return []; }
}

async function fetchSched(from, to) {
  const key=`sched_${fmt(from)}_${fmt(to)}`;
  if(scCache[key]) return scCache[key];
  const url=`${BASE}/SchoolSchedule?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT}&SD_SCHUL_CODE=${SC}&AA_FROM_YMD=${fmt(from)}&AA_TO_YMD=${fmt(to)}`;
  try {
    const j = await (await fetch(url)).json();
    const rows = (!j.RESULT && j.SchoolSchedule) ? (j.SchoolSchedule[1]?.row||[]) : [];
    scCache[key]=rows; return rows;
  } catch(e){ scCache[key]=[]; return []; }
}

/* ── 시간표 탭 ── */
async function renderWeek() {
  const dates = getWeekDates(selectedMonday);
  const f=dates[0], t=dates[4];
  $('navTitle').innerHTML=`${f.getMonth()+1}월 <small>${pad(f.getDate())} – ${pad(t.getDate())}일</small>`;
  $('ttArea').innerHTML='<div class="state-box"><span class="spin"></span>불러오는 중…</div>';

  const rows = await fetchTT(f, t);
  if (!rows.length) {
    $('ttArea').innerHTML='<div class="state-box">📭 시간표 정보가 없습니다<br><small style="font-size:11px;margin-top:4px;display:block;color:var(--ink3)">방학이거나 나이스 미등록 기간입니다</small></div>';
    return;
  }

  const dateMap={};
  dates.forEach((d,i)=>dateMap[fmt(d)]=i);
  const grid=Array.from({length:9},()=>Array(5).fill(''));
  let maxP=0;
  rows.forEach(r=>{
    const di=dateMap[r.ALL_TI_YMD]; if(di===undefined) return;
    const p=parseInt(r.PERIO)-1;
    if(p>=0&&p<9){ grid[p][di]=(r.ITRT_CNTNT||'').trim(); if(p+1>maxP) maxP=p+1; }
  });
  if(maxP===0) maxP=7;

  let thead='<thead><tr><th class="ph"></th>';
  dates.forEach((d,i)=>{
    const tc=isToday(d)?' tc':'';
    thead+=`<th class="${tc}"><span class="dn">${WDAYS[i]}</span><span class="dd">${pad(d.getMonth()+1)}/${pad(d.getDate())}</span></th>`;
  });
  thead+='</tr></thead>';

  let tbody='<tbody>';
  for(let p=0;p<maxP;p++){
    tbody+=`<tr><td class="pn">${p+1}교시</td>`;
    for(let d=0;d<5;d++){
      const subj=grid[p][d], tc=isToday(dates[d])?' tc':'';
      tbody+=subj?`<td class="${tc}">${subj}</td>`:`<td class="blank${tc}">·</td>`;
    }
    tbody+='</tr>';
  }
  tbody+='</tbody>';
  $('ttArea').innerHTML=`<div class="tt-wrap fade"><table>${thead}${tbody}</table></div>`;
}

/* ── 학사일정 탭 (월간) ── */
async function renderMonth() {
  const y=currentMonth.getFullYear(), m=currentMonth.getMonth();
  $('navTitle').innerHTML=`${y}년 <small>${m+1}월</small>`;
  $('schedListTitle').textContent=`${m+1}월 학사일정`;

  const from=new Date(y,m,1), to=new Date(y,m+1,0);
  $('monthGrid').innerHTML='<div style="grid-column:span 7"><div class="state-box"><span class="spin"></span>불러오는 중…</div></div>';
  $('schedListArea').innerHTML='<div class="state-box"><span class="spin"></span></div>';

  const scRows = await fetchSched(from, to);

  // 날짜별 일정 맵
  const evMap={};
  scRows.forEach(r=>{ (evMap[r.AA_YMD]||(evMap[r.AA_YMD]=[])).push(r.EVENT_NM); });

  // 달력 그리기
  const firstDow=from.getDay(), lastDate=to.getDate();
  let html='';

  for(let i=0;i<firstDow;i++){
    const d=new Date(y,m,1-firstDow+i);
    html+=`<div class="month-cell other ${d.getDay()===0?'sun':d.getDay()===6?'sat weekend':''}">`+cellHtml(d,evMap)+`</div>`;
  }
  for(let dd=1;dd<=lastDate;dd++){
    const d=new Date(y,m,dd), dw=d.getDay();
    const cls2=(isToday(d)?' today':'')+(dw===0?' sun':dw===6?' sat':'')+(dw===0||dw===6?' weekend':'');
    html+=`<div class="month-cell${cls2}">`+cellHtml(d,evMap)+`</div>`;
  }
  const remain=(7-(firstDow+lastDate)%7)%7;
  for(let i=1;i<=remain;i++){
    const d=new Date(y,m+1,i);
    html+=`<div class="month-cell other ${d.getDay()===0?'sun':d.getDay()===6?'sat weekend':''}">`+cellHtml(d,evMap)+`</div>`;
  }
  $('monthGrid').innerHTML=html;

  // 목록
  if(!scRows.length){
    $('schedListArea').innerHTML='<div class="state-box" style="padding:24px 0">이번 달 학사일정이 없습니다</div>';
    return;
  }
  let lh='';
  scRows.forEach(r=>{
    const y2=parseInt(r.AA_YMD.slice(0,4)),m2=parseInt(r.AA_YMD.slice(4,6))-1,d2=parseInt(r.AA_YMD.slice(6,8));
    const dobj=new Date(y2,m2,d2);
    const tc=isToday(dobj)?' today-ev':'';
    lh+=`<div class="sched-item${tc}"><div class="sched-date">${pad(m2+1)}.${pad(d2)} (${DFULL[dobj.getDay()]})</div><div class="sched-name">${r.EVENT_NM}</div></div>`;
  });
  $('schedListArea').innerHTML=lh;
}

function cellHtml(d, evMap) {
  const key=fmt(d);
  let h=`<span class="cell-num">${d.getDate()}</span>`;
  if(evMap[key]){
    h+=`<div class="cell-event">`;
    evMap[key].forEach(ev=>{ h+=`<span>◆ ${ev}</span>`; });
    h+=`</div>`;
  }
  return h;
}

/* ── 탭 전환 ── */
function setTab(tab) {
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  $('weekView').style.display  = tab==='week'  ? 'block' : 'none';
  $('monthView').style.display = tab==='month' ? 'block' : 'none';

  // 학년·반 컨트롤은 시간표 탭에서만 의미있지만 숨기진 않음
  if(tab==='week')  renderWeek();
  else              renderMonth();
}

/* ── 테마 ── */
let dark=localStorage.getItem('yc_dark')==='1';
function applyTheme(){ document.documentElement.setAttribute('data-theme',dark?'dark':'light'); $('themeBtn').textContent=dark?'☀️':'🌙'; localStorage.setItem('yc_dark',dark?'1':'0'); }
applyTheme();
$('themeBtn').onclick=()=>{ dark=!dark; applyTheme(); };

/* ── 이벤트 ── */
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

$('gradeRow').onclick=e=>{
  const b=e.target.closest('.seg-btn'); if(!b) return;
  $('gradeRow').querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); grade=parseInt(b.dataset.g);
  Object.keys(ttCache).forEach(k=>delete ttCache[k]); renderWeek();
};
$('classRow').onclick=e=>{
  const b=e.target.closest('.seg-btn'); if(!b) return;
  $('classRow').querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); cls=parseInt(b.dataset.c);
  Object.keys(ttCache).forEach(k=>delete ttCache[k]); renderWeek();
};

$('prev').onclick=()=>{
  if(activeTab==='week'){ selectedMonday.setDate(selectedMonday.getDate()-7); renderWeek(); }
  else { currentMonth.setMonth(currentMonth.getMonth()-1); renderMonth(); }
};
$('next').onclick=()=>{
  if(activeTab==='week'){ selectedMonday.setDate(selectedMonday.getDate()+7); renderWeek(); }
  else { currentMonth.setMonth(currentMonth.getMonth()+1); renderMonth(); }
};
$('todayBtn').onclick=()=>{
  selectedMonday=getMondayOf(new Date()); currentMonth=new Date();
  activeTab==='week' ? renderWeek() : renderMonth();
};

setTab('week');
</script>
</body>
</html>
