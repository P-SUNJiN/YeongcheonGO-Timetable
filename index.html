<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영천고 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f8fc;
  --card: #ffffff;
  --card2: #f0f2f8;
  --ink: #0e1420;
  --ink2: #4a5578;
  --ink3: #9aa3bc;
  --border: #e4e8f2;
  --accent: #3b5bfa;
  --accent-soft: #eef0ff;
  --accent-mid: #c7cefd;
  --red: #f03e3e;
  --shadow-sm: 0 2px 8px rgba(59,91,250,.06);
  --shadow: 0 4px 20px rgba(59,91,250,.1);
  --shadow-lg: 0 12px 48px rgba(59,91,250,.15);
  --r: 16px;
}
[data-theme="dark"] {
  --bg: #0b0d14;
  --card: #131622;
  --card2: #1a1e2e;
  --ink: #e8eaf5;
  --ink2: #7a83a8;
  --ink3: #404868;
  --border: #22283d;
  --accent: #5b78ff;
  --accent-soft: #1a1e3a;
  --accent-mid: #2a3060;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.3);
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow-lg: 0 16px 60px rgba(0,0,0,.6);
}

html { background: var(--bg); transition: background .3s; }
body {
  font-family: 'Pretendard', sans-serif;
  color: var(--ink);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 560px; margin: 0 auto; padding: 0 16px 64px; }

/* ── HEADER ── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0 24px;
}
.logo-area { display: flex; flex-direction: column; gap: 2px; }
.logo-school {
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  color: var(--accent); text-transform: uppercase; opacity: .8;
}
.logo-title {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 24px; font-weight: 700; letter-spacing: -.02em;
  color: var(--ink); line-height: 1;
}
.logo-title span { color: var(--accent); }

.hd-right { display: flex; align-items: center; gap: 8px; }
.today-chip {
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  background: var(--accent); color: #fff;
  border: none; border-radius: 20px; padding: 6px 14px; cursor: pointer;
  transition: all .2s; font-family: inherit;
}
.today-chip:hover { background: #2a46e8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,91,250,.3); }
.theme-btn {
  width: 36px; height: 36px; border-radius: 50%; background: var(--card);
  border: 1px solid var(--border); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm); transition: all .2s;
}
.theme-btn:hover { transform: rotate(20deg); box-shadow: var(--shadow); }

/* ── WEEK NAV ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 18px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.week-info { text-align: center; }
.week-label { font-size: 11px; font-weight: 700; color: var(--ink3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2px; }
.week-range { font-size: 15px; font-weight: 800; letter-spacing: -.02em; }
.nav-btn {
  width: 34px; height: 34px; background: var(--card2); border: none;
  border-radius: 10px; font-size: 16px; font-weight: 900; cursor: pointer;
  color: var(--ink2); display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.nav-btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); }

/* ── CONTROLS ── */
.ctrl-row {
  display: flex; gap: 12px; margin-bottom: 20px;
}
.ctrl-card {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px; box-shadow: var(--shadow-sm);
}
.ctrl-label { font-size: 10px; font-weight: 800; letter-spacing: .12em; color: var(--ink3); text-transform: uppercase; margin-bottom: 10px; }
.pill-row { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
  padding: 6px 12px; background: var(--card2); border: none; border-radius: 8px;
  font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink2);
  cursor: pointer; transition: all .15s;
}
.pill:hover { color: var(--accent); background: var(--accent-soft); }
.pill.on {
  background: var(--accent); color: #fff;
  box-shadow: 0 3px 10px rgba(59,91,250,.35);
}

/* ── TIMETABLE PANEL ── */
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.panel-hdr {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, var(--accent-soft) 0%, var(--card) 100%);
}
.panel-title { font-size: 14px; font-weight: 900; letter-spacing: -.02em; }
.panel-badge {
  font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  background: var(--accent); color: #fff; padding: 3px 8px; border-radius: 20px;
}
.state-box {
  padding: 52px 20px; text-align: center; color: var(--ink3); font-size: 13px; line-height: 1.8;
}
.spin {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABLE ── */
.tt-scroll { overflow-x: auto; padding: 0; }
table { width: 100%; border-collapse: collapse; }

thead tr { background: var(--card2); }
thead th {
  padding: 14px 4px; text-align: center;
  font-size: 12px; font-weight: 800; color: var(--ink2);
  border-bottom: 1.5px solid var(--border);
}
thead th.ph { width: 40px; color: var(--ink3); font-size: 10px; border-right: 1px solid var(--border); }
thead th .dn { display: block; font-size: 13px; font-weight: 800; color: var(--ink); }
thead th .dd { display: block; font-size: 10px; font-weight: 500; color: var(--ink3); margin-top: 1px; }
thead th.today-col .dn { color: var(--accent); }
thead th.today-col .dd { color: var(--accent-mid); }
thead th.today-col { position: relative; }
thead th.today-col::after {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}

tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td:not(.pn) { background: var(--accent-soft); }
tbody td {
  padding: 13px 4px; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--ink); vertical-align: middle; min-width: 70px;
}
tbody td.pn {
  font-size: 10px; font-weight: 800; color: var(--ink3); width: 40px;
  border-right: 1px solid var(--border); background: var(--card2);
  letter-spacing: .04em;
}
tbody td.blank { color: var(--border); font-size: 11px; }
tbody td.today-col { background: var(--accent-soft); }
tbody tr:hover td.today-col { background: var(--accent-mid); opacity: .7; }

/* ── SCHEDULE ── */
.sched-list { padding: 8px 20px 20px; }
.sched-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.sched-item:last-child { border-bottom: none; }
.sched-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.sched-date { font-size: 11px; font-weight: 700; color: var(--accent); width: 72px; flex-shrink: 0; }
.sched-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.sched-item.today-event { background: var(--accent-soft); border-radius: 8px; padding: 10px 12px; margin: 0 -4px; }

/* ── FADE IN ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.panel { animation: fadeUp .4s ease both; }
.panel:nth-child(2) { animation-delay: .08s; }
.ctrl-card { animation: fadeUp .35s ease both; }
.ctrl-card:nth-child(2) { animation-delay: .05s; }

/* 요일 헤더 색 */
thead th.sun .dn { color: var(--red); }
thead th.sat .dn { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="hd">
    <div class="logo-area">
      <div class="logo-school">Yeongcheon High School</div>
      <div class="logo-title">영천고 <span>시간표</span></div>
    </div>
    <div class="hd-right">
      <button class="today-chip" id="todayBtn">이번 주</button>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <!-- 주간 네비게이션 -->
  <div class="week-nav">
    <button class="nav-btn" id="prev">‹</button>
    <div class="week-info">
      <div class="week-label">조회 주간</div>
      <div class="week-range" id="weekRange">-- ~ --</div>
    </div>
    <button class="nav-btn" id="next">›</button>
  </div>

  <!-- 학년·반 설정 -->
  <div class="ctrl-row">
    <div class="ctrl-card">
      <div class="ctrl-label">학년</div>
      <div class="pill-row" id="gradeRow">
        <button class="pill on" data-g="1">1학년</button>
        <button class="pill" data-g="2">2학년</button>
        <button class="pill" data-g="3">3학년</button>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="ctrl-label">반</div>
      <div class="pill-row" id="classRow">
        <button class="pill on" data-c="1">1반</button>
        <button class="pill" data-c="2">2반</button>
        <button class="pill" data-c="3">3반</button>
        <button class="pill" data-c="4">4반</button>
        <button class="pill" data-c="5">5반</button>
        <button class="pill" data-c="6">6반</button>
      </div>
    </div>
  </div>

  <!-- 시간표 패널 -->
  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title" id="ttTitle">시간표</span>
      <span class="panel-badge" id="ttBadge">LIVE</span>
    </div>
    <div id="ttArea"><div class="state-box"><span class="spin"></span>불러오는 중…</div></div>
  </div>

  <!-- 학사일정 패널 -->
  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title">학사일정</span>
    </div>
    <div id="schedArea"><div class="state-box"><span class="spin"></span>불러오는 중…</div></div>
  </div>

</div>

<script>
const KEY   = '04b33987e1f94ec598b1835b6756736e';
const BASE  = 'https://open.neis.go.kr/hub';
const ATPT  = 'R10'; // 경상북도
const WDAYS = ['월','화','수','목','금'];
const DFULL = ['일','월','화','수','목','금','토'];
const SCHOOL_CODE = '8750119'; // 영천고등학교

let grade = 1, cls = 1;
let selectedMonday = getMondayOf(new Date());

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;

function getMondayOf(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekDates(mon) {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate()+i); return d;
  });
}
function isToday(d) {
  const n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}
function getSemester(d) {
  // 3월~8월 = 1학기, 9월~2월 = 2학기
  const m = d.getMonth() + 1;
  return m >= 3 && m <= 8 ? 1 : 2;
}
function getAY(d) {
  // 1~2월은 전년도 학년도
  return d.getMonth() < 2 ? d.getFullYear() - 1 : d.getFullYear();
}

function updateWeekDisplay(dates) {
  const f = dates[0], t = dates[4];
  $('weekRange').textContent = `${f.getFullYear()}.${pad(f.getMonth()+1)}.${pad(f.getDate())} ~ ${pad(t.getMonth()+1)}.${pad(t.getDate())}`;
}

function updateAll() {
  const dates = getWeekDates(selectedMonday);
  updateWeekDisplay(dates);
  $('ttTitle').textContent = `${grade}학년 ${cls}반 시간표`;
  fetchTimetable(dates);
  fetchSchedule(fmt(dates[0]), fmt(dates[4]));
}

async function fetchTimetable(dates) {
  $('ttArea').innerHTML = '<div class="state-box"><span class="spin"></span>불러오는 중…</div>';

  // 이번주 기준으로 학년도·학기 결정
  const refDate = dates[0];
  const ay  = getAY(refDate);
  const sem = getSemester(refDate);
  const from = fmt(dates[0]);
  const to   = fmt(dates[4]);

  // 여러 엔드포인트 시도 (중·고교 구분)
  const endpoints = ['hisTimetable', 'misTimetable'];

  for (const ep of endpoints) {
    const url = `${BASE}/${ep}?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT}&SD_SCHUL_CODE=${SCHOOL_CODE}&AY=${ay}&SEM=${sem}&GRADE=${grade}&CLASS_NM=${cls}&TI_FROM_YMD=${from}&TI_TO_YMD=${to}`;
    try {
      const res = await fetch(url);
      const json = await res.json();

      const key = ep === 'hisTimetable' ? 'hisTimetable' : 'misTimetable';
      if (json.RESULT || !json[key]) continue;

      const rows = json[key][1]?.row;
      if (!rows || rows.length === 0) continue;

      renderTimetable(rows, dates);
      return;
    } catch(e) { continue; }
  }

  $('ttArea').innerHTML = `<div class="state-box">
    📭 시간표 데이터가 없습니다<br>
    <small style="font-size:11px;color:var(--ink3);display:block;margin-top:6px">방학이거나 나이스에 미등록된 기간입니다</small>
  </div>`;
}

function renderTimetable(rows, dates) {
  const dateMap = {};
  dates.forEach((d,i) => dateMap[fmt(d)] = i);

  const grid = Array.from({length:9}, () => Array(5).fill(''));
  let maxP = 0;
  rows.forEach(r => {
    const di = dateMap[r.ALL_TI_YMD];
    if (di === undefined) return;
    const p = parseInt(r.PERIO) - 1;
    if (p >= 0 && p < 9) {
      grid[p][di] = (r.ITRT_CNTNT || '').trim();
      if (p+1 > maxP) maxP = p+1;
    }
  });
  if (maxP === 0) maxP = 7;

  // thead
  let thead = '<thead><tr><th class="ph">교시</th>';
  dates.forEach((d,i) => {
    const tc   = isToday(d) ? ' today-col' : '';
    const dow  = d.getDay(); // 1=월…5=금 (평일만이라 0,6 없음)
    thead += `<th class="${tc}"><span class="dn">${WDAYS[i]}</span><span class="dd">${pad(d.getMonth()+1)}/${pad(d.getDate())}</span></th>`;
  });
  thead += '</tr></thead>';

  // tbody
  let tbody = '<tbody>';
  for (let p = 0; p < maxP; p++) {
    tbody += `<tr><td class="pn">${p+1}교시</td>`;
    for (let d = 0; d < 5; d++) {
      const subj = grid[p][d];
      const tc   = isToday(dates[d]) ? ' today-col' : '';
      tbody += subj
        ? `<td class="${tc}">${subj}</td>`
        : `<td class="blank${tc}">·</td>`;
    }
    tbody += '</tr>';
  }
  tbody += '</tbody>';

  $('ttArea').innerHTML = `<div class="tt-scroll"><table>${thead}${tbody}</table></div>`;
}

async function fetchSchedule(from, to) {
  $('schedArea').innerHTML = '<div class="state-box"><span class="spin"></span>불러오는 중…</div>';

  const url = `${BASE}/SchoolSchedule?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT}&SD_SCHUL_CODE=${SCHOOL_CODE}&AA_FROM_YMD=${from}&AA_TO_YMD=${to}`;
  try {
    const res = await fetch(url);
    const json = await res.json();

    if (json.RESULT || !json.SchoolSchedule) {
      $('schedArea').innerHTML = '<div class="state-box">이 주의 학사일정이 없습니다</div>';
      return;
    }

    const rows = json.SchoolSchedule[1]?.row;
    let html = '<div class="sched-list">';
    rows.forEach(r => {
      const y = parseInt(r.AA_YMD.slice(0,4));
      const m = parseInt(r.AA_YMD.slice(4,6))-1;
      const d = parseInt(r.AA_YMD.slice(6,8));
      const dateObj = new Date(y,m,d);
      const dow = DFULL[dateObj.getDay()];
      const tcCls = isToday(dateObj) ? ' today-event' : '';
      html += `<div class="sched-item${tcCls}">
        <div class="sched-dot"></div>
        <div class="sched-date">${pad(m+1)}.${pad(d)} (${dow})</div>
        <div class="sched-name">${r.EVENT_NM}</div>
      </div>`;
    });
    html += '</div>';
    $('schedArea').innerHTML = html;
  } catch(e) {
    $('schedArea').innerHTML = '<div class="state-box">오류가 발생했습니다</div>';
  }
}

/* ── 테마 ── */
let dark = localStorage.getItem('yc_dark') === '1';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  $('themeBtn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('yc_dark', dark ? '1' : '0');
}
applyTheme();
$('themeBtn').onclick = () => { dark = !dark; applyTheme(); };

/* ── 이벤트 ── */
$('gradeRow').onclick = e => {
  const b = e.target.closest('.pill'); if (!b) return;
  $('gradeRow').querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); grade = parseInt(b.dataset.g); updateAll();
};
$('classRow').onclick = e => {
  const b = e.target.closest('.pill'); if (!b) return;
  $('classRow').querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); cls = parseInt(b.dataset.c); updateAll();
};
$('prev').onclick = () => { selectedMonday.setDate(selectedMonday.getDate()-7); updateAll(); };
$('next').onclick = () => { selectedMonday.setDate(selectedMonday.getDate()+7); updateAll(); };
$('todayBtn').onclick = () => { selectedMonday = getMondayOf(new Date()); updateAll(); };

updateAll();
</script>
</body>
</html>
